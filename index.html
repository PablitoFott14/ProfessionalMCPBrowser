<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Tool Browser</title>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<style>
/* ── RESET ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  font-size:14px;line-height:1.55;
  background:var(--bg);color:var(--text);
  transition:background .25s,color .25s;
}

/* ── THEME ──────────────────────────────────────────────────── */
:root{
  --bg:#07071a;
  --surface:#0c0c22;
  --card:#111128;
  --card-hover:#161640;
  --border:rgba(255,255,255,.06);
  --border-md:rgba(255,255,255,.1);
  --border-strong:rgba(255,255,255,.16);
  --text:#ddddf0;
  --text-dim:#6e6e96;
  --text-faint:#3e3e60;
  --header-h:56px;
  --sidebar-w:260px;
  --shadow:0 6px 30px rgba(0,0,0,.55);
  --radius:10px;
}
[data-theme="light"]{
  --bg:#f0f0f8;--surface:#e6e6f2;--card:#ffffff;--card-hover:#f5f5ff;
  --border:rgba(0,0,0,.07);--border-md:rgba(0,0,0,.11);--border-strong:rgba(0,0,0,.17);
  --text:#18182a;--text-dim:#54547a;--text-faint:#9898b8;
  --shadow:0 3px 18px rgba(0,0,0,.1);
}

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px}

/* ── LAYOUT ─────────────────────────────────────────────────── */
.layout{display:flex;min-height:calc(100vh - var(--header-h));padding-top:var(--header-h)}

/* ── HEADER ─────────────────────────────────────────────────── */
.header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:var(--header-h);display:flex;align-items:center;gap:14px;padding:0 18px;
  background:rgba(7,7,26,.9);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--border);
}
[data-theme="light"] .header{background:rgba(240,240,248,.93)}

.logo{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.logo-mark{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,#7c3aed,#3b82f6);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;letter-spacing:-.5px;
}
.logo-text{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-sep{width:1px;height:16px;background:var(--border-md);margin:0 2px}
.logo-sub{font-size:11px;color:var(--text-dim)}

.search-wrap{flex:1;max-width:520px;position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;color:var(--text-faint);font-size:14px;pointer-events:none}
#searchInput{
  width:100%;padding:7px 68px 7px 30px;
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:8px;color:var(--text);font-size:12.5px;outline:none;
  transition:border .2s,box-shadow .2s;
}
#searchInput:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.14)}
#searchInput::placeholder{color:var(--text-faint)}
.search-count{position:absolute;right:30px;font-size:11px;color:var(--text-dim);pointer-events:none}
.clear-btn{
  position:absolute;right:7px;width:19px;height:19px;background:none;border:none;
  cursor:pointer;color:var(--text-faint);font-size:17px;line-height:1;
  display:none;align-items:center;justify-content:center;border-radius:3px;
}
.clear-btn:hover{color:var(--text)}
.clear-btn.visible{display:flex}

.header-right{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.hdr-badge{
  padding:3px 10px;border-radius:20px;
  background:var(--surface);border:1px solid var(--border-md);
  font-size:11px;color:var(--text-dim);white-space:nowrap;
}
.icon-btn{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  background:var(--surface);border:1px solid var(--border-md);
  border-radius:7px;cursor:pointer;color:var(--text-dim);font-size:15px;
  transition:all .15s;
}
.icon-btn:hover{background:var(--card-hover);color:var(--text)}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
.sidebar{
  position:fixed;left:0;top:var(--header-h);bottom:0;width:var(--sidebar-w);
  background:var(--surface);border-right:1px solid var(--border);
  overflow-y:auto;padding:14px 10px;z-index:100;
}
.sidebar-label{
  font-size:9.5px;font-weight:700;letter-spacing:1.6px;color:var(--text-faint);
  text-transform:uppercase;padding:0 4px;margin-bottom:8px;display:block;
}
.sb-all{
  display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;
  cursor:pointer;font-size:12.5px;color:var(--text-dim);border:none;background:none;width:100%;
  transition:background .15s,color .15s;
}
.sb-all:hover,.sb-all.active{background:var(--card);color:var(--text)}
.sb-divider{height:1px;background:var(--border);margin:10px 4px}

.sni{
  display:flex;flex-direction:column;gap:3px;padding:9px 8px;border-radius:7px;
  margin-bottom:3px;cursor:pointer;text-decoration:none;
  border:1px solid transparent;transition:background .15s,border .15s;
}
.sni:hover{background:var(--card)}
.sni.active{background:var(--card);border-color:var(--border-md)}
.sni-row{display:flex;align-items:center;gap:7px}
.sni-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sni-name{font-size:12.5px;font-weight:600;color:var(--text)}
.sni-meta{display:flex;align-items:center;gap:6px;min-width:0;flex:1}
.sni-domain{font-size:10px;color:var(--text-faint);white-space:nowrap}
.sni-count{font-size:11px;color:var(--text-dim)}
.sni-bar-wrap{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-left:14px}
.sni-bar-fill{height:100%;border-radius:1px;transition:width .4s}
.sni-sub{font-size:10px;color:var(--text-faint);margin-left:14px}

/* ── MAIN ────────────────────────────────────────────────────── */
.main{margin-left:var(--sidebar-w);flex:1;padding:26px 30px;min-width:0}

/* ── FILTER PILLS ────────────────────────────────────────────── */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:26px}
.pill{
  padding:4px 13px;border-radius:20px;
  border:1px solid var(--border-md);background:var(--surface);
  color:var(--text-dim);font-size:11.5px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.pill:hover{border-color:var(--border-strong);color:var(--text)}
.pill.active{color:#fff;border-color:transparent}

/* ── SERVER SECTION ─────────────────────────────────────────── */
.server-section{margin-bottom:56px;scroll-margin-top:calc(var(--header-h)+14px)}

/* ── SERVER HEADER ───────────────────────────────────────────── */
.srv-hdr{
  display:flex;align-items:center;gap:11px;
  padding-bottom:14px;border-bottom:1px solid var(--border);
  margin-bottom:18px;
  flex-wrap:wrap;
}
.srv-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.srv-name{font-size:18px;font-weight:700;letter-spacing:-.4px}
.srv-domain{margin-left:2px}
.srv-count{
  margin-left:auto;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;
}

/* ── SERVER INTRO ────────────────────────────────────────────── */
.srv-intro{
  margin-bottom:22px;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:auto auto;
  gap:8px;
}
/* single card (no sections) */
.srv-intro.solo{grid-template-columns:1fr;grid-template-rows:auto}

/* individual info card */
.intro-card{
  border:1px solid var(--border);
  border-radius:8px;
  padding:15px 18px;
  background:var(--card);
  min-width:0;
}

.ic-label{
  font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:9px;
}

/* desc card: prose style */
.intro-card.ic-desc .sec-body{font-size:12.5px;line-height:1.8;color:var(--text)}
.intro-card.ic-how .sec-body,
.intro-card.ic-paths .sec-body,
.intro-card.ic-practice .sec-body{font-size:11.5px}

.sec-body{font-size:12px;color:var(--text-dim);line-height:1.7}
.sec-body ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.sec-body li{padding-left:13px;position:relative}
.sec-body li::before{content:'·';position:absolute;left:0;color:var(--text-faint)}
.sec-body strong{color:var(--text);font-weight:600}
.sec-body code{
  font-family:monospace;font-size:10.5px;
  background:var(--border-md);padding:1px 4px;border-radius:3px;color:var(--text-dim);
}
.sec-body em{font-style:italic}
.sec-body p{margin:0}
.sec-body p+p{margin-top:6px}

/* ── TOOLS GRID ─────────────────────────────────────────────── */
.tools-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
}
/* ── TOOL CARD ──────────────────────────────────────────────── */
.tool-card{
  min-width:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  display:flex;flex-direction:column;
  transition:box-shadow .2s,border-color .2s,transform .15s;
}
.tool-card:hover{
  box-shadow:var(--shadow);transform:translateY(-1px);
  border-color:var(--border-md);
}
.tool-card.hidden{display:none}

/* card header */
.tc-hdr{
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 14px;cursor:pointer;user-select:none;
}
.tc-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:36px}
.tc-info{flex:1;min-width:0}
.tc-name{
  font-size:12.5px;font-weight:700;letter-spacing:-.2px;
  word-break:break-word;line-height:1.4;
}
.tc-foot{
  display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;
}
.tc-counts{font-size:10.5px;color:var(--text-faint)}
.domain-pill{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:999px;
  border:1px solid var(--border-md);
  background:var(--surface);
  color:var(--text-dim);
  font-size:10px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;
  white-space:nowrap;
}

.tc-side{
  display:flex;flex-direction:column;align-items:center;
  gap:9px;flex-shrink:0;padding-top:2px;
}

/* ── STATUS LIGHT ───────────────────────────────────────────── */
.status-dot{
  width:9px;height:9px;border-radius:50%;flex-shrink:0;
}
.status-dot.green{background:#22c55e;box-shadow:0 0 7px 1px rgba(34,197,94,.6)}
.status-dot.yellow{background:#f59e0b;box-shadow:0 0 7px 1px rgba(245,158,11,.55)}
.status-dot.red{background:#ef4444;box-shadow:0 0 6px 1px rgba(239,68,68,.5)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.status-dot.green{animation:pulse 2.8s ease-in-out infinite}

/* expand button */
.xbtn{
  width:20px;height:20px;border-radius:4px;border:1px solid var(--border);
  background:none;cursor:pointer;color:var(--text-faint);font-size:11px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s,transform .25s;flex-shrink:0;
}
.xbtn:hover{background:var(--border);color:var(--text)}
.tool-card.open .xbtn{transform:rotate(180deg)}

/* ── CARD BODY ──────────────────────────────────────────────── */
.tc-body{overflow:hidden;height:0;transition:height .26s cubic-bezier(.4,0,.2,1)}
/* fallback height for cards that are open on re-render (search / filter) */
.tool-card.open .tc-body{height:auto}
.tc-body-inner{
  padding:0 14px 16px;border-top:1px solid var(--border);
  opacity:0;transition:opacity .22s ease;
}
.tool-card.open .tc-body-inner{opacity:1}

.tc-purpose{
  padding:13px 0 15px;
  font-size:12.5px;color:var(--text-dim);line-height:1.75;
  white-space:pre-line;
}

/* ── INNER SECTION LABEL ─────────────────────────────────────── */
.s-label{
  font-size:9.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;
  color:var(--text-faint);margin-bottom:9px;
  display:flex;align-items:center;gap:6px;
}
.s-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── PARAM TABLE ─────────────────────────────────────────────── */
.ptable{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:16px}
.ptable th{
  text-align:left;padding:5px 8px;font-size:9.5px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;color:var(--text-faint);
  border-bottom:1px solid var(--border);
}
.ptable td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.ptable tr:last-child td{border-bottom:none}
.ptable tr:hover td{background:rgba(255,255,255,.02)}
[data-theme="light"] .ptable tr:hover td{background:rgba(0,0,0,.02)}
.p-num{color:var(--text-faint);font-size:10px;font-family:monospace}
.p-name{font-family:monospace;font-weight:600;font-size:11.5px}
.badge{
  display:inline-block;padding:1px 5px;border-radius:3px;
  font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
}
.req{background:rgba(239,68,68,.13);color:#f87171}
.opt{background:rgba(99,102,241,.11);color:#818cf8}
.p-def{font-family:monospace;font-size:11px;color:var(--text-dim);white-space:nowrap}
.p-desc{color:var(--text-dim);font-size:11.5px}
.p-name{min-width:0}
.p-allowed{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.p-enum{
  font-family:'JetBrains Mono',Consolas,'Courier New',monospace;
  font-size:9.5px;padding:1px 5px;border-radius:3px;
  background:var(--border);color:var(--text-faint);white-space:nowrap;
}
.no-params{font-size:12px;color:var(--text-faint);font-style:italic;padding:4px 0 14px}

/* ── EXAMPLES ────────────────────────────────────────────────── */
.examples{display:flex;flex-direction:column;gap:8px}
.ex-block{border-radius:7px;overflow:hidden;border:1px solid var(--border)}
.ex-header{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:7px 11px;display:flex;flex-direction:column;gap:3px;
}
.ex-tool{
  font-family:'JetBrains Mono',Consolas,'Courier New',monospace;
  font-size:10px;font-weight:600;color:var(--text);letter-spacing:-.1px;
}
.ex-intent{
  font-size:11px;color:var(--text-dim);
  font-style:italic;line-height:1.5;
}
.ex-json{
  padding:10px 12px;
  font-family:'JetBrains Mono',Consolas,'Courier New',monospace;
  font-size:11px;line-height:1.65;background:var(--card);
  overflow-x:auto;white-space:pre;
}
.jk{color:#7dd3fc}.js{color:#86efac}.jn{color:#fbbf24}.jw{color:#f9a8d4}.jb{color:var(--text-dim)}
.no-ex{font-size:11.5px;color:var(--text-faint);font-style:italic;padding:4px 0}

/* ── RESOLUTION PATHS ────────────────────────────────────────── */
.paths{display:flex;flex-direction:column;gap:10px}
.path-item{}
.path-item p{margin:0;font-size:12px;line-height:1.6;color:var(--text-dim)}
.path-item p strong{color:var(--text-main);display:block;margin-bottom:3px;font-size:12px}
.path-item code{font-family:'JetBrains Mono',Consolas,'Courier New',monospace;font-size:11px;
  background:rgba(99,102,241,.1);color:#818cf8;padding:1px 5px;border-radius:3px}
.no-paths{font-size:11.5px;color:var(--text-faint);font-style:italic;padding:4px 0}

/* ── EMPTY ───────────────────────────────────────────────────── */
.empty{
  display:flex;flex-direction:column;align-items:center;
  padding:90px 24px;text-align:center;
}
.empty-icon{font-size:46px;opacity:.25;margin-bottom:16px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:6px}
.empty-text{font-size:13px;color:var(--text-dim)}

/* ── ANIM ────────────────────────────────────────────────────── */
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.server-section{animation:fi .3s ease both}
.tool-card{animation:fi .18s ease both}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:920px){.sidebar{display:none}.main{margin-left:0;padding:14px}}
@media(max-width:1400px){.tools-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:1080px){.tools-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:700px){.tools-grid{grid-template-columns:1fr}}
@media(max-width:540px){.logo-sep,.logo-sub,.hdr-badge{display:none}.header{padding:0 12px}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <a class="logo" href="#">
    <div class="logo-mark">M</div>
    <span class="logo-text">MCP Tool Browser</span>
    <div class="logo-sep"></div>
    <span class="logo-sub">Horus · Advanced Data Browser</span>
  </a>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="searchInput" type="search" placeholder="Search tool names only… (⌘K)" autocomplete="off" spellcheck="false">
    <span id="searchCount" class="search-count"></span>
    <button id="clearSearch" class="clear-btn" title="Clear">×</button>
  </div>

  <div class="header-right">
    <div id="totalBadge" class="hdr-badge"></div>
    <button id="themeToggle" class="icon-btn" title="Toggle theme">◑</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <span class="sidebar-label">Servers</span>
    <button class="sb-all active" id="sidebarAll" onclick="setFilter(null)">
      <span style="width:7px;height:7px;border-radius:50%;background:var(--text-faint);display:inline-block"></span>
      All Servers
      <span id="sidebarAllCount" class="sni-count" style="margin-left:auto"></span>
    </button>
    <div class="sb-divider"></div>
    <nav id="serverNav"></nav>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div id="filterBar" class="filter-bar"></div>
    <div id="content"></div>
    <div id="emptyState" class="empty" style="display:none">
      <div class="empty-icon">⌕</div>
      <div class="empty-title">No tools found</div>
      <div class="empty-text">Try a different search term or remove the active filter.</div>
    </div>
  </main>
</div>

<script>
/* ── SERVER COLOUR CONFIG ─────────────────────────────────── */
const DEFAULT_SERVER_COLORS = ['#8b5cf6','#f59e0b','#10b981','#ef4444','#06b6d4','#ec4899','#f97316','#84cc16','#14b8a6','#3b82f6'];
function hashName(s){
  let h = 0;
  for(const ch of String(s)) h = ((h << 5) - h) + ch.charCodeAt(0);
  return Math.abs(h);
}
function fallbackServerColor(name){
  return DEFAULT_SERVER_COLORS[hashName(name) % DEFAULT_SERVER_COLORS.length];
}
function hexToRgb(hex){
  const clean = String(hex).replace('#','').trim();
  if(clean.length !== 6) return null;
  const n = Number.parseInt(clean, 16);
  if(Number.isNaN(n)) return null;
  return {r:(n >> 16) & 255, g:(n >> 8) & 255, b:n & 255};
}
function rgba(hex, alpha){
  const rgb = hexToRgb(hex);
  return rgb ? `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})` : `rgba(99,102,241,${alpha})`;
}
function sc(n){
  const color = S.meta?.servers?.[n]?.color || fallbackServerColor(n);
  return {color, light:color, bg:rgba(color,.12)};
}

/* ── STATE ────────────────────────────────────────────────── */
const S = {data:null,status:{},meta:{servers:{}},search:'',filter:null,expanded:new Set()};

function getStatus(sname,tname){
  const s = (S.status[sname]?.[tname]) || 'active';
  if(s==='active')     return {cls:'green',  label:'Active'};
  if(s==='restricted') return {cls:'yellow', label:'Restricted'};
  return                      {cls:'red',    label:'Inactive'};
}

function getServerDomain(sname){
  return S.meta?.servers?.[sname]?.domain || 'Unassigned';
}

/* ── FUSE ─────────────────────────────────────────────────── */
let fuse, fidx=[];
function normName(s){
  return String(s).toLowerCase().trim();
}
function initFuse(){
  fidx=[];
  for(const srv of S.data.servers)
    for(const t of srv.tools)
      fidx.push({s:srv.name,n:t.name,norm:normName(t.name)});
  fuse=new Fuse(fidx,{
    keys:[{name:'n',weight:1}],
    threshold:.24,includeMatches:false,minMatchCharLength:2,ignoreLocation:true,
  });
}

function getVisible(){
  let ms=null;
  if(S.search.trim().length>=2){
    const q=normName(S.search);
    const exact=fidx.filter(x=>x.norm===q);
    const substring=(exact.length?exact:fidx.filter(x=>x.norm.includes(q)));
    const matches=substring.length?substring:fuse.search(S.search.trim()).map(r=>r.item);
    ms=new Set(matches.map(x=>`${x.s}::${x.n}`));
  }
  const out={};
  for(const srv of S.data.servers){
    if(S.filter&&srv.name!==S.filter) continue;
    out[srv.name]=srv.tools.map(t=>t.name).filter(n=>!ms||ms.has(`${srv.name}::${n}`));
  }
  return out;
}

/* ── UTILS ────────────────────────────────────────────────── */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function hJson(obj){
  return JSON.stringify(obj,null,2)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g,'<span class="jk">$1</span>$2')
    .replace(/:\s*("(?:[^"\\]|\\.)*")/g,(m,v)=>m.replace(v,`<span class="js">${v}</span>`))
    .replace(/:\s*(-?\d+(?:\.\d+)?(?:[eE][+-]?\d+)?)/g,(m,v)=>m.replace(v,`<span class="jn">${v}</span>`))
    .replace(/:\s*(true|false|null)/g,(m,v)=>m.replace(v,`<span class="jw">${v}</span>`))
    .replace(/[{}[\]]/g,c=>`<span class="jb">${c}</span>`);
}

/* ── INTRO PANEL ──────────────────────────────────────────── */
// Maps normalised section titles → card CSS class + display label
const CARD_TYPES = {
  'how it works':               {cls:'ic-how',     label:'How it works'},
  'potential resolution paths': {cls:'ic-paths',   label:'Potential resolution paths'},
  'best practices':             {cls:'ic-practice',label:'Best practices'},
};

function parseIntro(md){
  if(!md||!md.trim()) return null;
  const lines=md.split('\n');
  let desc=''; const sections=[];
  let cur=null;
  for(const l of lines){
    const h=l.match(/^###\s+(.+)/);
    if(h){if(cur)sections.push(cur);cur={title:h[1].trim(),lines:[]}}
    else if(cur) cur.lines.push(l);
    else desc+=l+'\n';
  }
  if(cur)sections.push(cur);
  return {desc:desc.trim(),sections};
}

function renderIntroPanel(srv){
  const parsed=parseIntro(srv.intro);
  if(!parsed) return '';
  const {desc,sections}=parsed;
  if(!desc&&!sections.length) return '';

  const cards=[];

  if(desc){
    cards.push(`<div class="intro-card ic-desc">
      <div class="ic-label">Description</div>
      <div class="sec-body">${mdToHtml(desc)}</div>
    </div>`);
  }

  for(const sec of sections){
    const key=sec.title.toLowerCase().trim();
    const ct=CARD_TYPES[key]||{cls:'ic-how',label:sec.title};
    cards.push(`<div class="intro-card ${ct.cls}">
      <div class="ic-label">${esc(ct.label)}</div>
      <div class="sec-body">${mdToHtml(sec.lines.join('\n'))}</div>
    </div>`);
  }

  const solo=cards.length===1?' solo':'';
  return `<div class="srv-intro${solo}">${cards.join('')}</div>`;
}

function mdToHtml(text){
  // minimal markdown: bold, code, lists, paragraphs
  const lines=text.split('\n');
  let out='';let inList=false;
  for(const raw of lines){
    const l=raw.trim();
    if(!l){if(inList){out+='</ul>';inList=false}out+='';continue}
    if(l.startsWith('- ')){
      if(!inList){out+='<ul>';inList=true}
      out+=`<li>${inline(l.slice(2))}</li>`;
    } else {
      if(inList){out+='</ul>';inList=false}
      out+=`<p>${inline(l)}</p>`;
    }
  }
  if(inList) out+='</ul>';
  return out;
}
function inline(s){
  return s
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>');
}

/* ── PARAM TABLE ──────────────────────────────────────────── */
function renderParams(params){
  if(!params.length) return `<p class="no-params">This tool takes no parameters.</p>`;
  const rows=params.map(p=>`<tr>
    <td class="p-num">${p.number}</td>
    <td class="p-name">${esc(p.name)}${p.allowed&&p.allowed.length?`<div class="p-allowed">${p.allowed.map(v=>`<span class="p-enum">${esc(v)}</span>`).join('')}</div>`:''}</td>
    <td><span class="badge ${p.required?'req':'opt'}">${p.required?'req':'opt'}</span></td>
    <td class="p-def">${esc(p.default)}</td>
    <td class="p-desc">${esc(p.description)}</td>
  </tr>`).join('');
  return `<table class="ptable">
    <colgroup>
      <col style="width:28px">
      <col style="width:30%">
      <col style="width:38px">
      <col style="width:18%">
      <col>
    </colgroup>
    <thead><tr><th>#</th><th>Parameter</th><th></th><th>Default</th><th>Description</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* ── EXAMPLES ─────────────────────────────────────────────── */
function renderExamples(exs, paramsWrapped){
  if(!exs.length) return `<p class="no-ex">No examples available.</p>`;
  return `<div class="examples">${exs.map(ex=>{
    const payload = paramsWrapped
      ? (ex.params!=null ? {params: ex.params} : ex)
      : (ex.params??ex);
    const hasHeader = ex.tool || ex.intent;
    return `<div class="ex-block">
      ${hasHeader?`<div class="ex-header">
        ${ex.tool?`<span class="ex-tool">${esc(ex.tool)}</span>`:''}
        ${ex.intent?`<span class="ex-intent">${esc(ex.intent)}</span>`:''}
      </div>`:''}
      <pre class="ex-json">${hJson(payload)}</pre>
    </div>`;
  }).join('')}</div>`;
}

/* ── RESOLUTION PATHS ────────────────────────────────────── */
function renderPaths(md){
  if(!md) return `<p class="no-paths">No resolution paths documented.</p>`;
  // Split on bold lines that start a new path entry (**"..."**)
  // Each entry: bold title + following paragraph(s)
  const html = mdToHtml(md);
  return `<div class="paths">${html}</div>`;
}

/* ── TOOL CARD ────────────────────────────────────────────── */
function renderCard(srv,tool){
  const c=sc(srv.name);
  const st=getStatus(srv.name,tool.name);
  const open=S.expanded.has(`${srv.name}::${tool.name}`);
  const np=tool.parameters.length, ne=tool.examples.length;

  return `<div class="tool-card${open?' open':''}"
      id="tc-${esc(srv.name)}-${esc(tool.name)}"
      data-s="${esc(srv.name)}" data-t="${esc(tool.name)}">
    <div class="tc-hdr" onclick="expand('${esc(srv.name)}','${esc(tool.name)}')">
      <div class="tc-bar" style="background:${c.color}"></div>
      <div class="tc-info">
        <div class="tc-name">${esc(tool.name)}</div>
        <div class="tc-foot">
          <span class="tc-counts">${np} param${np!==1?'s':''} · ${ne} example${ne!==1?'s':''}</span>
        </div>
      </div>
      <div class="tc-side" onclick="event.stopPropagation()">
        <div class="status-dot ${st.cls}" title="${st.label}"></div>
        <button class="xbtn" onclick="expand('${esc(srv.name)}','${esc(tool.name)}')" title="${open?'Collapse':'Expand'}">▾</button>
      </div>
    </div>
    <div class="tc-body">
      <div class="tc-body-inner">
        <div class="tc-purpose">${esc(tool.purpose)}</div>
        <div class="s-label">Parameters</div>
        ${renderParams(tool.parameters)}
        <div class="s-label">Examples</div>
        ${renderExamples(tool.examples, srv.paramsWrapped)}
      </div>
    </div>
  </div>`;
}

/* ── SERVER SECTION ───────────────────────────────────────── */
function renderServer(srv,vis){
  if(!vis.length) return '';
  const c=sc(srv.name);
  const domain=getServerDomain(srv.name);
  const total=srv.tools.length;
  const nActive=srv.tools.filter(t=>getStatus(srv.name,t.name).cls==='green').length;

  const cards=srv.tools.map(t=>{
    const html=renderCard(srv,t);
    return vis.includes(t.name)?html:html.replace('class="tool-card','class="tool-card hidden');
  }).join('');

  return `<section class="server-section" id="section-${esc(srv.name)}">
    <div class="srv-hdr">
      <div class="srv-dot" style="background:${c.color};box-shadow:0 0 8px ${c.color}aa"></div>
      <span class="srv-name" style="color:${c.color}">${esc(srv.name)}</span>
      <span class="domain-pill srv-domain">${esc(domain)}</span>
      <div class="srv-count" style="background:${c.bg};color:${c.light}">${nActive} / ${total} active</div>
    </div>
    ${renderIntroPanel(srv)}
    <div class="tools-grid">${cards}</div>
  </section>`;
}

/* ── SIDEBAR ──────────────────────────────────────────────── */
function renderSidebar(vis){
  document.getElementById('serverNav').innerHTML=S.data.servers.map(srv=>{
    const c=sc(srv.name);
    const domain=getServerDomain(srv.name);
    const total=srv.tools.length;
    const nA=srv.tools.filter(t=>getStatus(srv.name,t.name).cls==='green').length;
    const pct=total?Math.round((nA/total)*100):0;
    const vc=vis[srv.name]?.length??0;
    return `<a class="sni${S.filter===srv.name?' active':''}"
        href="#section-${esc(srv.name)}" onclick="setFilter('${esc(srv.name)}',event)">
      <div class="sni-row">
        <span class="sni-dot" style="background:${c.color}"></span>
        <span class="sni-meta">
          <span class="sni-name">${esc(srv.name)}</span>
          <span class="sni-domain">${esc(domain)}</span>
        </span>
        <span class="sni-count">${S.search?`${vc}/`:''}${total}</span>
      </div>
      <div class="sni-bar-wrap"><div class="sni-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      <div class="sni-sub">${nA} / ${total} active</div>
    </a>`;
  }).join('');
  document.getElementById('sidebarAll').className='sb-all'+(S.filter?'':' active');
  document.getElementById('sidebarAllCount').textContent=S.data.servers.length;
}

/* ── FILTER BAR ───────────────────────────────────────────── */
function renderFilterBar(){
  document.getElementById('filterBar').innerHTML=
    [`<span class="pill${!S.filter?' active':''}" style="${!S.filter?'background:#6366f1;color:#fff':''}" onclick="setFilter(null)">All</span>`]
    .concat(S.data.servers.map(srv=>{
      const c=sc(srv.name),a=S.filter===srv.name;
      return `<span class="pill${a?' active':''}" style="${a?`background:${c.color};color:#fff`:''}" onclick="setFilter('${esc(srv.name)}')">${esc(srv.name)}</span>`;
    })).join('');
}

/* ── RENDER ───────────────────────────────────────────────── */
function render(){
  const vis=getVisible();
  const cnt=document.getElementById('content');
  const em=document.getElementById('emptyState');
  let html='',total=0;
  for(const srv of S.data.servers){
    const v=vis[srv.name]||[];
    total+=v.length;
    html+=renderServer(srv,v);
  }
  cnt.innerHTML=html;

  if(S.search&&total===0){cnt.style.display='none';em.style.display='flex';}
  else{cnt.style.display='';em.style.display='none';}

  const sc2=document.getElementById('searchCount');
  if(S.search.trim().length>=2){
    sc2.textContent=`${total} result${total!==1?'s':''}`;
    document.getElementById('clearSearch').classList.add('visible');
  } else {
    sc2.textContent='';
    document.getElementById('clearSearch').classList.remove('visible');
  }
  const all=S.data.servers.reduce((a,s)=>a+s.tools.length,0);
  document.getElementById('totalBadge').textContent=`${all} tools`;
  renderSidebar(vis);
  renderFilterBar();
}

/* ── INTERACTIONS ─────────────────────────────────────────── */
function expand(sname,tname){
  const k=`${sname}::${tname}`;
  const el=document.getElementById(`tc-${sname}-${tname}`);
  if(!el)return;
  const body=el.querySelector('.tc-body');

  if(S.expanded.has(k)){
    // collapse: pin to current pixel height, then animate to 0
    S.expanded.delete(k);
    el.classList.remove('open');
    body.style.height=body.scrollHeight+'px';
    body.offsetHeight; // force reflow
    body.style.height='0';
  } else {
    // expand: measure target height, animate from 0
    S.expanded.add(k);
    el.classList.add('open');
    const target=body.scrollHeight+'px';
    body.style.height='0';
    body.offsetHeight; // force reflow
    body.style.height=target;
    body.addEventListener('transitionend',()=>{
      if(S.expanded.has(k)) body.style.height='auto';
    },{once:true});
  }
}

function setFilter(name,e){
  if(e)e.preventDefault();
  S.filter=(S.filter===name)?null:name;
  render();
  if(name&&e) setTimeout(()=>{
    const el=document.getElementById(`section-${name}`);
    if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
  },50);
}

/* ── SEARCH ───────────────────────────────────────────────── */
let st;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(st);S.search=e.target.value;st=setTimeout(render,140);
});
document.getElementById('clearSearch').addEventListener('click',()=>{
  S.search='';document.getElementById('searchInput').value='';render();
});
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}
  if(e.key==='Escape')document.getElementById('searchInput').blur();
});

/* ── THEME ────────────────────────────────────────────────── */
function applyTheme(t){
  document.documentElement.dataset.theme=t;
  document.getElementById('themeToggle').textContent=t==='dark'?'◑':'●';
  try{localStorage.setItem('mcp-theme',t)}catch(e){}
}
document.getElementById('themeToggle').addEventListener('click',()=>{
  applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
});
try{const t=localStorage.getItem('mcp-theme');if(t)applyTheme(t);}catch(e){}

/* ── INIT ─────────────────────────────────────────────────── */
async function load(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error(`${url} → HTTP ${r.status}`);
  return r.json();
}

(async()=>{
  try{
    const [data,status,meta]=await Promise.all([load('tools-data.json'),load('tools-status.json'),load('tools-metadata.json')]);
    S.data=data; S.status=status; S.meta=meta;
    initFuse(); render();
  }catch(e){
    document.getElementById('content').innerHTML=`<div class="empty" style="display:flex">
      <div class="empty-icon">⚠</div>
      <div class="empty-title">Could not load data files</div>
      <div class="empty-text">${esc(e.message)}<br>Serve locally: <code>python -m http.server 8080</code></div>
    </div>`;
  }
})();
</script>
